<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're in — Innerwine</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  color: #E8D5B8;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
  overflow: hidden;
}

.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 78% 55%, rgba(118,60,10,0.52) 0%, transparent 65%),
    radial-gradient(ellipse 40% 45% at 88% 72%, rgba(90,42,5,0.42) 0%, transparent 60%),
    radial-gradient(ellipse 50% 35% at 65% 80%, rgba(100,50,6,0.34) 0%, transparent 55%),
    radial-gradient(ellipse 30% 28% at 14% 65%, rgba(75,36,4,0.26) 0%, transparent 55%),
    linear-gradient(165deg, #000 0%, #060300 22%, #0d0601 40%, #150900 58%, #110701 78%, #070400 100%);
}
.bg::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom,
    rgba(0,0,0,1) 0%, rgba(0,0,0,0.75) 12%,
    rgba(0,0,0,0.28) 32%, rgba(0,0,0,0) 52%,
    rgba(0,0,0,0.22) 72%, rgba(0,0,0,0.9) 100%);
}

.content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
}

@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes breathe { 0%,100% { filter:drop-shadow(0 0 28px rgba(194,59,76,0.28)); } 50% { filter:drop-shadow(0 0 48px rgba(194,59,76,0.5)); } }

.mark {
  margin-bottom: 36px;
  animation: fadeUp 1s ease forwards, breathe 4s ease-in-out 1s infinite;
}

.eyebrow {
  font-size: 10px; letter-spacing: 0.44em; text-transform: uppercase;
  color: rgba(196,160,80,0.6); margin-bottom: 22px;
  animation: fadeUp 0.9s ease forwards 0.2s; opacity: 0;
}

.title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(42px, 8vw, 72px);
  font-weight: 400; line-height: 1.05;
  color: #E8D5B8; margin-bottom: 6px;
  animation: fadeUp 1s ease forwards 0.35s; opacity: 0;
}

.title-em {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(42px, 8vw, 72px);
  font-weight: 400; font-style: italic;
  color: #C4A050; display: block; margin-bottom: 36px;
  animation: fadeUp 1s ease forwards 0.45s; opacity: 0;
}

.body {
  font-size: clamp(14px, 2.2vw, 16px);
  font-weight: 300; line-height: 1.8;
  color: rgba(232,213,184,0.55);
  max-width: 380px; margin-bottom: 52px;
  animation: fadeUp 1s ease forwards 0.6s; opacity: 0;
}

.divider {
  width: 40px; height: 1px;
  background: rgba(196,160,80,0.28);
  margin-bottom: 36px;
  animation: fadeUp 1s ease forwards 0.7s; opacity: 0;
}

.back-link {
  font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
  color: rgba(232,213,184,0.35); text-decoration: none;
  border-bottom: 1px solid rgba(232,213,184,0.12);
  padding-bottom: 3px; transition: all 0.2s;
  animation: fadeUp 1s ease forwards 0.8s; opacity: 0;
}
.back-link:hover { color: rgba(232,213,184,0.6); border-bottom-color: rgba(232,213,184,0.3); }
</style>
</head>
<body>

<div class="bg"></div>

<div class="content">

  <!-- Official red mark -->
  <div class="mark">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="80" height="80" role="img" aria-label="Innerwine">
      <defs>
        <radialGradient id="g" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#C23B4C" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#C23B4C" stop-opacity="0"/>
        </radialGradient>
        <clipPath id="b"><path d="M 72 44 L 128 44 L 112 115 L 88 115 Z"/></clipPath>
      </defs>
      <circle cx="100" cy="100" r="99" fill="#1A0A0A"/>
      <circle cx="100" cy="100" r="88" fill="url(#g)"/>
      <path d="M 12 100 A 88 88 0 0 1 56 23.79"          fill="none" stroke="#C23B4C" stroke-width="8" stroke-linecap="round"/>
      <path d="M 56 23.79 A 88 88 0 0 1 130.098 17.307"  fill="none" stroke="#8A1726" stroke-width="8" stroke-linecap="round"/>
      <path d="M 130.098 17.307 A 88 88 0 0 1 182.693 69.902" fill="none" stroke="#C4503A" stroke-width="8" stroke-linecap="round"/>
      <path d="M 182.693 69.902 A 88 88 0 0 1 176.21 144" fill="none" stroke="#C4A050" stroke-width="8" stroke-linecap="round"/>
      <path d="M 176.21 144 A 88 88 0 0 1 118.296 186.077" fill="none" stroke="#E8607A" stroke-width="8" stroke-linecap="round"/>
      <path d="M 118.296 186.077 A 88 88 0 0 1 69.902 182.693" fill="none" stroke="#8A1726" stroke-width="8" stroke-linecap="round"/>
      <path d="M 69.902 182.693 A 88 88 0 0 1 23.79 144"  fill="none" stroke="#C4A050" stroke-width="8" stroke-linecap="round"/>
      <path d="M 23.79 144 A 88 88 0 0 1 12 100"          fill="none" stroke="#A03248" stroke-width="8" stroke-linecap="round"/>
      <circle cx="100" cy="100" r="73" fill="none" stroke="#BC425B" stroke-width="3.5" opacity="0.50"/>
      <circle cx="100" cy="100" r="59" fill="none" stroke="#A0394E" stroke-width="2"   opacity="0.30"/>
      <rect x="70" y="82" width="60" height="35" fill="#8B1A2A" opacity="0.75" clip-path="url(#b)"/>
      <path d="M 72 44 L 128 44 L 112 115 L 88 115 Z" fill="none" stroke="#E8D5B8" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="98" y="115" width="4" height="33" fill="#E8D5B8"/>
      <line x1="78" y1="148" x2="122" y2="148" stroke="#E8D5B8" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>

  <p class="eyebrow">Innerwine</p>
  <h1 class="title">You're on the list.</h1>
  <span class="title-em">We'll be in touch.</span>

  <p class="body">Check your inbox — a confirmation email is on its way. Once confirmed, you'll hear from us the moment Innerwine opens. No noise before then.</p>

  <div class="divider"></div>
  <a class="back-link" href="https://innerwine.com">← Back to innerwine.com</a>

</div>

</body>
</html>
